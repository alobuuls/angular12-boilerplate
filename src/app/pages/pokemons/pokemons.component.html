<sh-title txt="Pokemones"></sh-title>

<sh-loader *ngIf="isLoading"></sh-loader>

<div *ngIf="!isLoading" class="ctn-cards" [ngClass]="{'active': activeContainer}">
  <sh-title *ngFor="let pokemon of pokemons" [txt]="pokemon.name" colorTxt="white" sizeTxt="2rem" (wasClickedTitle)="getDataFromChild($event)"></sh-title>
</div>
